<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electro-Taller POS</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); padding-bottom: 100px; }
        .container { max-width: 800px; margin: auto; padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        /* Tabla de Ventas */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #eee; font-size: 0.8em; color: #666; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; }
        .p-name { font-weight: bold; display: block; }
        .p-v { font-size: 0.7em; padding: 2px 5px; border-radius: 4px; background: #eee; }
        .price { color: var(--success); font-weight: bold; }

        /* Carrito Flotante */
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        
        /* Modal de Boleta */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .ticket { background: white; width: 90%; max-width: 400px; padding: 20px; border-radius: 8px; color: #333; font-family: monospace; }
        
        .btn { border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background: var(--primary); color: white; width: 100%; }
        .btn-pay { background: var(--success); color: white; padding: 10px 20px; }
        .btn-wa { background: #25D366; color: white; width: 100%; margin-top: 10px; font-size: 1.1em; }
        
        .hidden { display: none; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="margin:0; color: var(--primary)">⚡ SAN MARTÍN</h2>
        <input type="text" id="busqueda" placeholder="🔍 Buscar repuesto..." onkeyup="renderizar()">
        <table id="tabla-productos">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="lista-publica"></tbody>
        </table>
        <button class="btn" style="width:100%; margin-top:15px; color:var(--primary)" onclick="toggleAdmin()">⚙️ Inventario</button>
    </div>
</div>

<div id="cart-bar" class="hidden">
    <div>
        <span id="cart-count">0</span> productos | 
        <strong>Total: S/ <span id="cart-total">0.00</span></strong>
    </div>
    <button class="btn btn-pay" onclick="mostrarBoleta()">🛒 Finalizar</button>
</div>

<div id="modal-boleta" class="modal hidden">
    <div class="ticket">
        <h3 style="text-align:center; margin:0">BOLETA DE VENTA</h3>
        <p style="text-align:center; font-size: 0.8em;">Taller San MARTÍN</p>
        <hr>
        <div id="ticket-items"></div>
        <hr>
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2em">
            <span>TOTAL:</span>
            <span id="ticket-total"></span>
        </div>
        <br>
        <input type="number" id="cliente-wa" placeholder="Número de WhatsApp (9 dígitos)">
        <button class="btn btn-wa" onclick="enviarWhatsApp()">Enviar a WhatsApp</button>
        <button class="btn" style="width:100%; margin-top:10px;" onclick="cerrarBoleta()">Cancelar / Nueva Venta</button>
    </div>
</div>

<div id="admin-panel" class="modal hidden" style="overflow-y: auto;">
    <div class="card" style="width:90%; max-width:600px; margin: 20px auto;">
        <h3>📦 Gestión de Inventario</h3>
        <div id="filas-nuevas"></div>
        <button class="btn btn-add" onclick="agregarFilaNueva()">+ Añadir Fila</button><br><br>
        <button class="btn btn-pay" style="width:100%" onclick="guardarTodo()">Guardar Todo</button>
        <button class="btn" style="width:100%; margin-top:10px" onclick="toggleAdmin()">Cerrar</button>
    </div>
</div>

<script>
    let inventario = JSON.parse(localStorage.getItem('taller_inv')) || [];
    let carrito = [];

    function renderizar() {
        const filtro = document.getElementById('busqueda').value.toLowerCase();
        const lista = document.getElementById('lista-publica');
        lista.innerHTML = '';

        inventario.forEach((p, index) => {
            if (p.nombre.toLowerCase().includes(filtro)) {
                lista.innerHTML += `
                    <tr>
                        <td>
                            <span class="p-name">${p.nombre}</span>
                            <span class="p-v">${p.voltaje}</span> 
                            <small>Stock: ${p.stock}</small>
                        </td>
                        <td class="price">S/ ${p.pVenta.toFixed(2)}</td>
                        <td><button class="btn btn-add" onclick="agregarAlCarrito(${index})">+</button></td>
                    </tr>
                `;
            }
        });
    }

    function agregarAlCarrito(index) {
        const p = inventario[index];
        if(p.stock <= 0) return alert("Sin stock");
        
        carrito.push({ nombre: p.nombre, precio: p.pVenta, originalIndex: index });
        p.stock -= 1; // Descuento visual previo
        actualizarCarritoUI();
    }

    function actualizarCarritoUI() {
        const bar = document.getElementById('cart-bar');
        if(carrito.length > 0) {
            bar.classList.remove('hidden');
            const total = carrito.reduce((sum, item) => sum + item.precio, 0);
            document.getElementById('cart-count').innerText = carrito.length;
            document.getElementById('cart-total').innerText = total.toFixed(2);
        } else {
            bar.classList.add('hidden');
        }
        renderizar();
    }

    function mostrarBoleta() {
        const itemsDiv = document.getElementById('ticket-items');
        itemsDiv.innerHTML = '';
        let total = 0;
        
        // Agrupar productos repetidos
        const resumen = carrito.reduce((acc, curr) => {
            acc[curr.nombre] = (acc[curr.nombre] || 0) + 1;
            return acc;
        }, {});

        for (const [nombre, cant] of Object.entries(resumen)) {
            const precioItem = carrito.find(c => c.nombre === nombre).precio;
            const subtotal = precioItem * cant;
            total += subtotal;
            itemsDiv.innerHTML += `<div style="display:flex; justify-content:space-between">
                <span>${cant}x ${nombre.substring(0,20)}</span>
                <span>S/ ${subtotal.toFixed(2)}</span>
            </div>`;
        }

        document.getElementById('ticket-total').innerText = `S/ ${total.toFixed(2)}`;
        document.getElementById('modal-boleta').classList.remove('hidden');
    }

    function enviarWhatsApp() {
        const num = document.getElementById('cliente-wa').value;
        if(num.length < 9) return alert("Ingresa un número válido");

        let texto = "*BOLETA ELECTRÓNICA - SAN MARTÍN*%0A--------------------------%0A";
        const resumen = carrito.reduce((acc, curr) => {
            acc[curr.nombre] = (acc[curr.nombre] || 0) + 1;
            return acc;
        }, {});

        for (const [nombre, cant] of Object.entries(resumen)) {
            const precioItem = carrito.find(c => c.nombre === nombre).precio;
            texto += `${cant} x ${nombre} = S/ ${(precioItem * cant).toFixed(2)}%0A`;
        }
        
        const total = document.getElementById('ticket-total').innerText;
        texto += `--------------------------%0A*TOTAL A PAGAR: ${total}*%0A%0A_¡Gracias por su preferencia!_`;

        // Guardar permanentemente el stock descontado
        localStorage.setItem('taller_inv', JSON.stringify(inventario));
        
        window.open(`https://wa.me/51${num}?text=${texto}`, '_blank');
        cerrarBoleta();
    }

    function cerrarBoleta() {
        carrito = [];
        document.getElementById('modal-boleta').classList.add('hidden');
        actualizarCarritoUI();
    }

    // --- FUNCIONES DE ADMIN ---
    function toggleAdmin() {
        const panel = document.getElementById('admin-panel');
        if(panel.classList.contains('hidden')) {
            const p = prompt("Clave:");
            if(p === "1234") {
                panel.classList.remove('hidden');
                cargarAdminUI();
            }
        } else { panel.classList.add('hidden'); }
    }

    function cargarAdminUI() {
        const div = document.getElementById('filas-nuevas');
        div.innerHTML = '';
        inventario.forEach((p, i) => {
            div.innerHTML += `<div class="card">
                <input type="text" value="${p.nombre}" onchange="inventario[${i}].nombre=this.value">
                <div style="display:flex; gap:5px">
                    <input type="number" value="${p.pCompra}" onchange="actualizarPrecio(${i}, 'compra', this.value)" placeholder="Costo">
                    <input type="number" value="${p.margen}" onchange="actualizarPrecio(${i}, 'margen', this.value)" placeholder="%">
                    <input type="number" value="${p.stock}" onchange="inventario[${i}].stock=parseInt(this.value)" placeholder="Stock">
                </div>
            </div>`;
        });
    }

    function actualizarPrecio(i, tipo, valor) {
        if(tipo === 'compra') inventario[i].pCompra = parseFloat(valor);
        if(tipo === 'margen') inventario[i].margen = parseFloat(valor);
        inventario[i].pVenta = inventario[i].pCompra * (1 + (inventario[i].margen/100));
        cargarAdminUI();
    }

    function agregarFilaNueva() {
        inventario.push({ nombre: 'Nuevo Producto', voltaje: '12V', pCompra: 0, margen: 30, stock: 0, pVenta: 0 });
        cargarAdminUI();
    }

    function guardarTodo() {
        localStorage.setItem('taller_inv', JSON.stringify(inventario));
        renderizar();
        alert("Guardado");
    }

    renderizar();
</script>
</body>
</html>
