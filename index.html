<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAN MARTÍN - Sistema Integral</title>
    <link rel="manifest" href="manifest.json">
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }</script>
    <style>
        :root { --primary: #2563eb; --success: #16a34a; --danger: #dc2626; --warning: #ca8a04; --dark: #1e293b; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--dark); padding-bottom: 100px; }
        .container { max-width: 900px; margin: auto; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        /* Filtros y Buscador */
        .filter-bar { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .btn-filter { padding: 8px 15px; border-radius: 20px; border: 1px solid #ccc; background: white; cursor: pointer; white-space: nowrap; }
        .btn-filter.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        /* Tabla Principal */
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #eee; font-size: 0.8em; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .stock-tag { font-size: 0.8em; padding: 2px 6px; border-radius: 4px; background: #eee; }
        .low-stock { background: #fee2e2; color: var(--danger); font-weight: bold; border: 1px solid var(--danger); }

        /* Carrito y Modales */
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--dark); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 200; }
        .modal-content { background: white; width: 95%; max-width: 600px; padding: 20px; border-radius: 12px; max-height: 90vh; overflow-y: auto; }

        /* Botones */
        .btn { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; }
        .btn-add { background: var(--primary); color: white; width: 40px; }
        .btn-block { width: 100%; display: block; margin-top: 10px; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        
        .hidden { display: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 style="margin:0 0 10px 0; color:var(--primary)">⚡ Taller SAN MARTÍN</h2>
        
        <div class="nav-tabs">
            <button class="btn-filter active" onclick="switchTab('ventas')">Vender</button>
            <button class="btn-filter" onclick="switchTab('historial')">Caja/Historial</button>
            <button class="btn-filter" onclick="switchTab('gastos')">Gastos</button>
            <button class="btn-filter" onclick="toggleAdmin()">⚙️ Inv.</button>
        </div>

        <div id="tab-ventas" class="tab-content active">
            <input type="text" id="busqueda" placeholder="🔍 Buscar producto..." onkeyup="renderizar()">
            <div class="filter-bar">
                <button class="btn-filter active" id="f-all" onclick="setFiltro('todos')">Todos</button>
                <button class="btn-filter" id="f-12v" onclick="setFiltro('12V')">12V</button>
                <button class="btn-filter" id="f-24v" onclick="setFiltro('24V')">24V</button>
            </div>
            <table>
                <thead><tr><th>Producto</th><th>Precio</th><th>Acción</th></tr></thead>
                <tbody id="lista-productos"></tbody>
            </table>
        </div>

        <div id="tab-historial" class="tab-content">
            <h3>📊 Resumen de Hoy</h3>
            <div id="resumen-caja" style="background:#f8fafc; padding:15px; border-radius:8px; margin-bottom:15px;"></div>
            <button class="btn btn-danger btn-block" onclick="exportarBackup()">📥 Descargar Backup Datos</button>
            <h4>Ventas Detalladas</h4>
            <div id="lista-historial"></div>
        </div>

        <div id="tab-gastos" class="tab-content">
            <h3>💸 Registro de Gastos</h3>
            <input type="text" id="gasto-desc" placeholder="Descripción (ej: Pago Luz)">
            <input type="number" id="gasto-monto" placeholder="Monto S/">
            <button class="btn btn-success btn-block" onclick="agregarGasto()">Registrar Gasto</button>
            <hr>
            <div id="lista-gastos"></div>
        </div>
    </div>
</div>

<div id="cart-bar" class="hidden">
    <div>Items: <span id="cart-count">0</span> | Total: <strong>S/ <span id="cart-total">0.00</span></strong></div>
    <button class="btn btn-success" onclick="abrirBoleta()">PAGAR</button>
</div>

<div id="modal-boleta" class="modal hidden">
    <div class="modal-content">
        <h3 style="text-align:center">BOLETA - SAN MARTÍN</h3>
        <div id="ticket-items" style="font-family:monospace; font-size:0.9em"></div>
        <hr>
        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:1.2em">
            <span>TOTAL:</span><span id="ticket-total"></span>
        </div>
        <input type="number" id="cliente-wa" style="margin-top:15px" placeholder="WhatsApp del cliente">
        <button class="btn btn-success btn-block" style="background:#25D366" onclick="finalizarVenta(true)">WhatsApp y Guardar</button>
        <button class="btn btn-block" style="background:#ddd" onclick="finalizarVenta(false)">Solo Guardar</button>
        <button class="btn btn-block" style="background:none; color:gray" onclick="document.getElementById('modal-boleta').classList.add('hidden')">Volver</button>
    </div>
</div>

<div id="admin-panel" class="modal hidden">
    <div class="modal-content">
        <h3>📦 Inventario Masivo</h3>
        <div style="overflow-x:auto"><table id="tabla-admin"></table></div>
        <button class="btn btn-block" style="background:var(--dark); color:white" onclick="nuevaFilaAdmin()">+ Nueva Fila</button>
        <button class="btn btn-success btn-block" onclick="guardarAdmin()">Guardar Cambios</button>
        <button class="btn btn-block" style="background:#ddd" onclick="toggleAdmin()">Cerrar</button>
    </div>
</div>

<script>
    let inventario = JSON.parse(localStorage.getItem('taller_inv')) || [];
    let carrito = JSON.parse(localStorage.getItem('taller_carrito')) || [];
    let historial = JSON.parse(localStorage.getItem('taller_historial')) || [];
    let gastos = JSON.parse(localStorage.getItem('taller_gastos')) || [];
    let filtroVoltaje = 'todos';

    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        if(tab === 'historial') actualizarHistorial();
        if(tab === 'gastos') actualizarGastosUI();
    }

    function setFiltro(v) {
        filtroVoltaje = v;
        document.querySelectorAll('.filter-bar .btn-filter').forEach(b => b.classList.remove('active'));
        document.getElementById('f-' + v.toLowerCase()).classList.add('active');
        renderizar();
    }

    function renderizar() {
        const busca = document.getElementById('busqueda').value.toLowerCase();
        const lista = document.getElementById('lista-productos');
        lista.innerHTML = '';

        inventario.forEach((p, i) => {
            if ((filtroVoltaje === 'todos' || p.voltaje === filtroVoltaje) && p.nombre.toLowerCase().includes(busca)) {
                const sClass = p.stock <= 3 ? 'low-stock' : '';
                lista.innerHTML += `<tr>
                    <td><strong>${p.nombre}</strong><br><span class="stock-tag ${sClass}">${p.voltaje} | Stock: ${p.stock}</span></td>
                    <td style="color:var(--success); font-weight:bold">S/ ${p.pVenta.toFixed(2)}</td>
                    <td><button class="btn btn-add" onclick="agregarAlCarrito(${i})">+</button></td>
                </tr>`;
            }
        });
        actualizarCartUI();
    }

    function agregarAlCarrito(i) {
        if(inventario[i].stock <= 0) return alert("Sin stock");
        inventario[i].stock--;
        carrito.push({ nombre: inventario[i].nombre, precio: inventario[i].pVenta, costo: inventario[i].pCompra });
        localStorage.setItem('taller_inv', JSON.stringify(inventario));
        localStorage.setItem('taller_carrito', JSON.stringify(carrito));
        renderizar();
    }

    function actualizarCartUI() {
        const bar = document.getElementById('cart-bar');
        if(carrito.length > 0) {
            bar.classList.remove('hidden');
            const total = carrito.reduce((s, x) => s + x.precio, 0);
            document.getElementById('cart-count').innerText = carrito.length;
            document.getElementById('cart-total').innerText = total.toFixed(2);
        } else { bar.classList.add('hidden'); }
    }

    function abrirBoleta() {
        const div = document.getElementById('ticket-items');
        div.innerHTML = '';
        let total = 0;
        carrito.forEach(x => {
            total += x.precio;
            div.innerHTML += `<div style="display:flex; justify-content:space-between"><span>1x ${x.nombre}</span><span>S/ ${x.precio.toFixed(2)}</span></div>`;
        });
        document.getElementById('ticket-total').innerText = 'S/ ' + total.toFixed(2);
        document.getElementById('modal-boleta').classList.remove('hidden');
    }

    function finalizarVenta(ws) {
        const total = carrito.reduce((s, x) => s + x.precio, 0);
        const costoTotal = carrito.reduce((s, x) => s + x.costo, 0);
        const venta = { fecha: new Date().toLocaleString(), items: [...carrito], total, ganancia: total - costoTotal };
        
        historial.push(venta);
        localStorage.setItem('taller_historial', JSON.stringify(historial));

        if(ws) {
            const num = document.getElementById('cliente-wa').value;
            let msg = `*SAN MARTÍN AREQUIPA*%0AFecha: ${venta.fecha}%0A---%0A`;
            carrito.forEach(x => msg += `- ${x.nombre}: S/ ${x.precio}%0A`);
            msg += `---%0A*TOTAL: S/ ${total.toFixed(2)}*`;
            window.open(`https://wa.me/51${num}?text=${msg}`, '_blank');
        }

        carrito = [];
        localStorage.removeItem('taller_carrito');
        document.getElementById('modal-boleta').classList.add('hidden');
        renderizar();
    }

    function agregarGasto() {
        const desc = document.getElementById('gasto-desc').value;
        const monto = parseFloat(document.getElementById('gasto-monto').value);
        if(desc && monto) {
            gastos.push({ desc, monto, fecha: new Date().toLocaleDateString() });
            localStorage.setItem('taller_gastos', JSON.stringify(gastos));
            actualizarGastosUI();
            document.getElementById('gasto-desc').value = '';
            document.getElementById('gasto-monto').value = '';
        }
    }

    function actualizarGastosUI() {
        const div = document.getElementById('lista-gastos');
        div.innerHTML = '';
        gastos.forEach(g => div.innerHTML += `<div style="display:flex; justify-content:space-between; font-size:0.9em; padding:5px 0; border-bottom:1px solid #eee"><span>${g.desc}</span><strong>- S/ ${g.monto}</strong></div>`);
    }

    function actualizarHistorial() {
        const div = document.getElementById('resumen-caja');
        const vTot = historial.reduce((s,x) => s + x.total, 0);
        const gTot = historial.reduce((s,x) => s + x.ganancia, 0);
        const gast = gastos.reduce((s,x) => s + x.monto, 0);
        
        div.innerHTML = `
            <div style="display:flex; justify-content:space-between"><span>Ventas Totales:</span><strong>S/ ${vTot.toFixed(2)}</strong></div>
            <div style="display:flex; justify-content:space-between"><span>Ganancia Bruta:</span><strong>S/ ${gTot.toFixed(2)}</strong></div>
            <div style="display:flex; justify-content:space-between; color:red"><span>Gastos:</span><strong>- S/ ${gast.toFixed(2)}</strong></div>
            <hr>
            <div style="display:flex; justify-content:space-between; font-size:1.2em; color:var(--success)"><span>NETO CAJA:</span><strong>S/ ${(gTot - gast).toFixed(2)}</strong></div>
        `;
    }

    function exportarBackup() {
        const data = { inventario, historial, gastos };
        const blob = new Blob([JSON.stringify(data)], {type: "application/json"});
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `backup_taller_${new Date().toLocaleDateString()}.json`;
        a.click();
    }

    // ADMIN FUNCTIONS
    function toggleAdmin() { document.getElementById('admin-panel').classList.toggle('hidden'); if(!document.getElementById('admin-panel').classList.contains('hidden')) cargarAdmin(); }
    function cargarAdmin() {
        const t = document.getElementById('tabla-admin');
        t.innerHTML = `<tr><th>Nombre</th><th>Costo</th><th>%</th><th>Stock</th><th>Volt</th></tr>`;
        inventario.forEach((p, i) => {
            t.innerHTML += `<tr>
                <td><input type="text" value="${p.nombre}" onchange="inventario[${i}].nombre=this.value"></td>
                <td><input type="number" value="${p.pCompra}" style="width:50px" onchange="calcVenta(${i}, 'pCompra', this.value)"></td>
                <td><input type="number" value="${p.margen}" style="width:40px" onchange="calcVenta(${i}, 'margen', this.value)"></td>
                <td><input type="number" value="${p.stock}" style="width:40px" onchange="inventario[${i}].stock=parseInt(this.value)"></td>
                <td><select onchange="inventario[${i}].voltaje=this.value"><option value="12V" ${p.voltaje=='12V'?'selected':''}>12V</option><option value="24V" ${p.voltaje=='24V'?'selected':''}>24V</option></select></td>
            </tr>`;
        });
    }
    function calcVenta(i, field, val) {
        inventario[i][field] = parseFloat(val);
        inventario[i].pVenta = inventario[i].pCompra * (1 + (inventario[i].margen/100));
    }
    function nuevaFilaAdmin() { inventario.push({ nombre:'', pCompra:0, margen:30, pVenta:0, stock:0, voltaje:'12V' }); cargarAdmin(); }
    function guardarAdmin() { localStorage.setItem('taller_inv', JSON.stringify(inventario)); toggleAdmin(); renderizar(); }

    renderizar();
</script>
</body>
</html>
